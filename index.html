<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plumbline Office Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --cyan: #35c7ff;
  --orange: #ff9f1c;
  --glass: rgba(255,255,255,.12);
  --glass-border: rgba(255,255,255,.22);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  height: 100vh;
  overflow: hidden;
  font-family: "Segoe UI", Arial, sans-serif;
  color: white;
  background:
    radial-gradient(circle at top left, rgba(53,199,255,.28), transparent 34%),
    radial-gradient(circle at bottom right, rgba(255,159,28,.16), transparent 36%),
    linear-gradient(135deg, #061a33, #0b3d72 58%, #041326);
  background-size: 140% 140%;
  animation: backgroundMove 420s ease-in-out infinite alternate;
}

@keyframes backgroundMove {
  0% { background-position: 0% 0%; }
  50% { background-position: 80% 40%; }
  100% { background-position: 20% 100%; }
}

.screen-safe {
  height: calc(100vh - 60px);
  padding: 8px;
  overflow: hidden;
}

.burn-in-shift {
  height: 100%;
  animation: pixelShift 420s infinite alternate ease-in-out;
}

@keyframes pixelShift {
  0% { transform: translate(0, 0); }
  20% { transform: translate(4px, -3px); }
  40% { transform: translate(-4px, 3px); }
  60% { transform: translate(3px, 4px); }
  80% { transform: translate(-4px, -3px); }
  100% { transform: translate(3px, -4px); }
}

.dim-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  pointer-events: none;
  z-index: 999;
  transition: background 2s ease;
}

.dim-overlay.active {
  background: rgba(0,0,0,.42);
}

.header {
  height: 76px;
  padding: 10px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,.30);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 18px;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 22px;
}

.logo {
  height: 50px;
  filter: drop-shadow(0 5px 12px rgba(0,0,0,.4));
}

.location {
  font-size: 28px;
  font-weight: 700;
}

.time {
  font-size: 24px;
  opacity: .95;
}

.layout {
  height: calc(100% - 76px);
  padding-top: 18px;
  display: grid;
  grid-template-columns: 1.05fr .95fr;
  gap: 18px;
}

.panel {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  box-shadow: 0 24px 70px rgba(0,0,0,.28);
  backdrop-filter: blur(14px);
  overflow: hidden;
  position: relative;
}

.panel::before {
  content: "";
  position: absolute;
  inset: -60%;
  background: radial-gradient(circle, rgba(255,255,255,.08), transparent 35%);
  animation: panelGlow 300s linear infinite;
  pointer-events: none;
}

@keyframes panelGlow {
  from { transform: translate(-10%, -10%) rotate(0deg); }
  to { transform: translate(10%, 10%) rotate(360deg); }
}

.panel-title {
  font-size: 27px;
  font-weight: 800;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}

/* LEFT: WEEKLY NEWS */

.news-panel {
  padding: 20px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.news-box {
  flex: 1;
  border-radius: 22px;
  overflow: hidden;
  background: rgba(0,0,0,.38);
  border: 1px solid rgba(255,255,255,.16);
  position: relative;
  z-index: 1;
}

.video-placeholder {
  width: 100%;
  height: 100%;
  border: 2px dashed rgba(255,255,255,.25);
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 30px;
  line-height: 1.35;
  padding: 34px;
  opacity: .9;
}

.youtube-frame {
  width: 100%;
  height: 100%;
  border: none;
}

/* RIGHT COLUMN */

.right-column {
  height: 100%;
  display: grid;
  grid-template-rows: .46fr .54fr;
  gap: 18px;
}

/* WEATHER TOP RIGHT */

.weather-panel {
  padding: 18px;
  display: grid;
  grid-template-rows: auto auto minmax(0, 1fr);
  min-height: 0;
}

.weather-main {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 18px;
  align-items: center;
  position: relative;
  z-index: 1;
}

.weather-icon {
  font-size: 62px;
}

.current-temp {
  font-size: 70px;
  line-height: .95;
  font-weight: 850;
  letter-spacing: -3px;
}

.condition {
  font-size: 26px;
  font-weight: 700;
  margin-top: 2px;
}

.details {
  font-size: 17px;
  margin-top: 5px;
  opacity: .9;
}

.forecast-strip {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
  position: relative;
  z-index: 1;
  min-height: 0;
}

.day-card {
  background: rgba(0,0,0,.20);
  border-radius: 15px;
  padding: 8px 5px;
  text-align: center;
  border: 1px solid rgba(255,255,255,.12);
  overflow: hidden;
  display: grid;
  grid-template-rows: auto auto auto auto;
  align-content: center;
}

.day-name {
  font-size: 14px;
  font-weight: 800;
  line-height: 1.05;
}

.day-icon {
  font-size: 22px;
  margin: 3px 0 1px;
}

.day-temp {
  font-size: 21px;
  font-weight: 800;
  color: var(--cyan);
  line-height: 1.1;
}

.day-condition {
  margin-top: 2px;
  font-size: 10px;
  line-height: 1.1;
  opacity: .9;
}

/* PHOTOS BOTTOM RIGHT */

.photo-panel {
  padding: 18px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.photo-box {
  flex: 1;
  border-radius: 22px;
  overflow: hidden;
  background: rgba(0,0,0,.38);
  border: 1px solid rgba(255,255,255,.16);
  position: relative;
  z-index: 1;
}

.photo-placeholder {
  width: 100%;
  height: 100%;
  border: 2px dashed rgba(255,255,255,.25);
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 27px;
  line-height: 1.35;
  padding: 28px;
  opacity: .9;
}

.slide-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1.2s ease-in-out;
}

.slide-image.active {
  opacity: 1;
}

.photo-caption {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  padding: 18px 22px;
  background: linear-gradient(transparent, rgba(0,0,0,.82));
  font-size: 24px;
  font-weight: 700;
}

/* TICKER */

.ticker {
  position: fixed;
  left: 0;
  bottom: 0;
  height: 60px;
  width: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.74);
  border-top: 1px solid rgba(255,255,255,.18);
  font-size: 27px;
  white-space: nowrap;
  z-index: 20;
}

.ticker-content {
  display: inline-block;
}

.ticker-content.scrolling {
  padding-left: 100%;
  animation: scrollTicker 42s linear infinite;
}

@keyframes scrollTicker {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

.badge {
  color: var(--orange);
  font-weight: 800;
}

.status {
  position: fixed;
  right: 22px;
  bottom: 68px;
  font-size: 13px;
  opacity: .45;
  z-index: 21;
}
</style>
</head>

<body>

<div class="screen-safe">
  <div class="burn-in-shift">

    <header class="header">
      <div class="logo-wrap">
        <img class="logo" src="https://wg.scene7.com/is/image/wrenchgroup/updated-2023-logo-pl23wi001wg?fmt=png-alpha" alt="Plumbline Services">
        <div class="location">Centennial, CO</div>
      </div>
      <div class="time" id="time">Loading...</div>
    </header>

    <main class="layout">

      <section class="panel news-panel">
        <div class="panel-title">Weekly News</div>
        <div class="news-box" id="videoBox">
          <div class="video-placeholder">
            Weekly YouTube video<br><br>
            Add video URL later from form
          </div>
        </div>
      </section>

      <section class="right-column">

        <section class="panel weather-panel">
          <div class="panel-title">Weather</div>

          <div class="weather-main">
            <div class="weather-icon" id="currentIcon">🌤️</div>

            <div>
              <div class="current-temp" id="currentTemp">--°</div>
              <div class="condition" id="currentCondition">Loading weather...</div>
              <div class="details" id="currentDetails">Please wait.</div>
            </div>
          </div>

          <div class="forecast-strip" id="weekGrid"></div>
        </section>

        <section class="panel photo-panel">
          <div class="panel-title">Company Photos</div>
          <div class="photo-box" id="photoBox">
            <div class="photo-placeholder">
              Photo rotation placeholder<br><br>
              Supports 30+ images<br>
              fading every 3 seconds
            </div>
          </div>
        </section>

      </section>

    </main>

  </div>
</div>

<div class="ticker">
  <div class="ticker-content" id="tickerText">No active announcements</div>
</div>

<div class="status" id="status">Weather not updated yet</div>
<div class="dim-overlay" id="dimOverlay"></div>

<script>
const LAT = 39.5807;
const LON = -104.8772;
const TIMEZONE = "America/Denver";

/*
Paste your published Google Sheet CSV URL below.

It should look like:
https://docs.google.com/spreadsheets/d/e/2PACX-.../pub?output=csv

Do not use the forms.gle link here.
*/

const ANNOUNCEMENT_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxKJOdXWka7Y6CBllcb37RrSw-Av5DNVJ4hcHahFE22EYXDIq1Kvgwnokt7JfVeYd_b8AvhDyUpEoj/pub?output=csv";

const ENABLE_OFF_HOURS_DIM = true;
const DIM_START_HOUR = 18;
const DIM_END_HOUR = 6;

const YOUTUBE_EMBED_URL = "";

const PHOTO_SLIDES = [
  // "photos/photo1.jpg",
  // "photos/photo2.jpg",
  // "photos/photo3.jpg"
];

let photoIndex = 0;

function updateClock() {
  const now = new Date();

  document.getElementById("time").textContent = now.toLocaleString("en-US", {
    timeZone: TIMEZONE,
    weekday: "long",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  });

  updateDimming(now);
}

function updateDimming(now) {
  if (!ENABLE_OFF_HOURS_DIM) return;

  const denverHour = Number(now.toLocaleString("en-US", {
    timeZone: TIMEZONE,
    hour: "numeric",
    hour12: false
  }));

  const shouldDim = denverHour >= DIM_START_HOUR || denverHour < DIM_END_HOUR;
  document.getElementById("dimOverlay").classList.toggle("active", shouldDim);
}

function iconFor(text = "") {
  const f = text.toLowerCase();

  if (f.includes("thunder")) return "⛈️";
  if (f.includes("snow")) return "❄️";
  if (f.includes("rain") || f.includes("showers")) return "🌧️";
  if (f.includes("fog") || f.includes("haze") || f.includes("smoke")) return "🌫️";
  if (f.includes("wind")) return "💨";
  if (f.includes("partly") || f.includes("mostly sunny")) return "⛅";
  if (f.includes("cloudy") || f.includes("overcast")) return "☁️";
  if (f.includes("sunny") || f.includes("clear")) return "☀️";

  return "🌤️";
}

function cToF(c) {
  return Math.round((c * 9/5) + 32);
}

function shortenForecast(text = "") {
  if (text.length > 15) {
    return text.substring(0, 15) + "...";
  }
  return text;
}

function denverDateParts(date) {
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: TIMEZONE,
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  }).formatToParts(date);

  return {
    year: Number(parts.find(p => p.type === "year").value),
    month: Number(parts.find(p => p.type === "month").value),
    day: Number(parts.find(p => p.type === "day").value)
  };
}

function dateKey(date) {
  const parts = denverDateParts(date);
  return `${parts.year}-${String(parts.month).padStart(2, "0")}-${String(parts.day).padStart(2, "0")}`;
}

function todayInDenver() {
  const parts = denverDateParts(new Date());
  return new Date(parts.year, parts.month - 1, parts.day);
}

function weekdayLabel(dateString) {
  return new Date(dateString).toLocaleDateString("en-US", {
    timeZone: TIMEZONE,
    weekday: "short"
  });
}

async function getWeather() {
  try {
    const pointResponse = await fetch(`https://api.weather.gov/points/${LAT},${LON}`);
    const pointData = await pointResponse.json();

    const forecastUrl = pointData.properties.forecast;
    const stationsUrl = pointData.properties.observationStations;

    const forecastResponse = await fetch(forecastUrl);
    const forecastData = await forecastResponse.json();
    const periods = forecastData.properties.periods;

    const stationResponse = await fetch(stationsUrl);
    const stationData = await stationResponse.json();
    const stationId = stationData.features[0].properties.stationIdentifier;

    const obsResponse = await fetch(`https://api.weather.gov/stations/${stationId}/observations/latest`);
    const obsData = await obsResponse.json();

    updateCurrent(obsData, periods[0]);
    updateWeek(periods);

    document.getElementById("status").textContent =
      "Weather updated " + new Date().toLocaleTimeString("en-US", {
        hour: "numeric",
        minute: "2-digit"
      });

  } catch (err) {
    console.error(err);
    document.getElementById("currentCondition").textContent = "Weather unavailable";
    document.getElementById("currentDetails").textContent = "Unable to load NOAA weather data.";
    document.getElementById("status").textContent = "Weather update failed";
  }
}

function updateCurrent(obsData, fallbackPeriod) {
  const props = obsData.properties;
  const tempC = props.temperature.value;
  const text = props.textDescription || fallbackPeriod.shortForecast;

  document.getElementById("currentIcon").textContent = iconFor(text);
  document.getElementById("currentTemp").textContent =
    tempC !== null ? `${cToF(tempC)}°` : `${fallbackPeriod.temperature}°`;

  document.getElementById("currentCondition").textContent = text || "Current Conditions";

  const windValue = props.windSpeed && props.windSpeed.value;
  const humidityValue = props.relativeHumidity && props.relativeHumidity.value;

  const windMph = windValue !== null && windValue !== undefined
    ? Math.round(windValue * 2.237) + " mph"
    : "N/A";

  const humidity = humidityValue !== null && humidityValue !== undefined
    ? Math.round(humidityValue) + "%"
    : "N/A";

  document.getElementById("currentDetails").textContent =
    `Wind: ${windMph} • Humidity: ${humidity}`;
}

function updateWeek(periods) {
  const grid = document.getElementById("weekGrid");
  grid.innerHTML = "";

  const today = dateKey(new Date());

  const days = periods
    .filter(p => p.isDaytime)
    .filter(p => dateKey(new Date(p.startTime)) !== today)
    .slice(0, 5);

  days.forEach(day => {
    const card = document.createElement("div");
    card.className = "day-card";

    card.innerHTML = `
      <div class="day-name">${weekdayLabel(day.startTime)}</div>
      <div class="day-icon">${iconFor(day.shortForecast)}</div>
      <div class="day-temp">${day.temperature}°</div>
      <div class="day-condition">${shortenForecast(day.shortForecast)}</div>
    `;

    grid.appendChild(card);
  });
}

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function parseCsv(csvText) {
  const rows = [];
  let row = [];
  let value = "";
  let insideQuotes = false;

  for (let i = 0; i < csvText.length; i++) {
    const char = csvText[i];
    const nextChar = csvText[i + 1];

    if (char === '"' && insideQuotes && nextChar === '"') {
      value += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      row.push(value.trim());
      value = "";
    } else if ((char === "\n" || char === "\r") && !insideQuotes) {
      if (value || row.length) {
        row.push(value.trim());
        rows.push(row);
        row = [];
        value = "";
      }
      if (char === "\r" && nextChar === "\n") i++;
    } else {
      value += char;
    }
  }

  if (value || row.length) {
    row.push(value.trim());
    rows.push(row);
  }

  return rows.filter(r => r.some(cell => String(cell).trim() !== ""));
}

function parseSheetDate(value) {
  if (!value) return null;

  const cleaned = String(value).trim();

  const usMatch = cleaned.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (usMatch) {
    let year = Number(usMatch[3]);
    if (year < 100) year += 2000;

    return new Date(
      year,
      Number(usMatch[1]) - 1,
      Number(usMatch[2])
    );
  }

  const isoMatch = cleaned.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (isoMatch) {
    return new Date(
      Number(isoMatch[1]),
      Number(isoMatch[2]) - 1,
      Number(isoMatch[3])
    );
  }

  const parsed = new Date(cleaned);
  if (!isNaN(parsed)) {
    return new Date(parsed.getFullYear(), parsed.getMonth(), parsed.getDate());
  }

  return null;
}

function normalizeHeader(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9]/g, "");
}

function findColumn(headers, possibleNames) {
  const normalizedHeaders = headers.map(normalizeHeader);

  for (const name of possibleNames) {
    const normalizedName = normalizeHeader(name);
    const exactIndex = normalizedHeaders.indexOf(normalizedName);

    if (exactIndex !== -1) {
      return exactIndex;
    }
  }

  return -1;
}

function setTickerMessage(html, shouldScroll) {
  const ticker = document.getElementById("tickerText");

  ticker.innerHTML = html;
  ticker.classList.toggle("scrolling", shouldScroll);
}

async function loadAnnouncements() {
  if (
    !ANNOUNCEMENT_CSV_URL ||
    ANNOUNCEMENT_CSV_URL.includes("PASTE-YOUR-PUBLISHED-GOOGLE-SHEET-CSV-LINK-HERE")
  ) {
    setTickerMessage("No active announcements", false);
    return;
  }

  try {
    const cacheBuster = ANNOUNCEMENT_CSV_URL.includes("?") ? "&" : "?";
    const response = await fetch(`${ANNOUNCEMENT_CSV_URL}${cacheBuster}t=${Date.now()}`);

    if (!response.ok) {
      throw new Error(`Announcement sheet failed: ${response.status}`);
    }

    const csvText = await response.text();

    if (!csvText || csvText.toLowerCase().includes("<html")) {
      throw new Error("Announcement URL did not return CSV data.");
    }

    const rows = parseCsv(csvText);

    if (rows.length < 2) {
      setTickerMessage("No active announcements", false);
      return;
    }

    const headers = rows[0];

    const titleIndex = findColumn(headers, [
      "Announcement Title",
      "Title"
    ]);

    const messageIndex = findColumn(headers, [
      "Announcement Message",
      "Message"
    ]);

    const startIndex = findColumn(headers, [
      "Start Date",
      "Start"
    ]);

    const endIndex = findColumn(headers, [
      "End Date",
      "End"
    ]);

    if (titleIndex === -1 || messageIndex === -1) {
      throw new Error("Could not find announcement title/message columns.");
    }

    const today = todayInDenver();

    const activeAnnouncements = rows.slice(1)
      .map(row => {
        return {
          title: row[titleIndex] || "",
          message: row[messageIndex] || "",
          startDate: startIndex >= 0 ? parseSheetDate(row[startIndex]) : null,
          endDate: endIndex >= 0 ? parseSheetDate(row[endIndex]) : null
        };
      })
      .filter(item => item.title || item.message)
      .filter(item => {
        const startsOk = !item.startDate || item.startDate <= today;
        const endsOk = !item.endDate || item.endDate >= today;

        return startsOk && endsOk;
      });

    if (!activeAnnouncements.length) {
      setTickerMessage("No active announcements", false);
      return;
    }

    const tickerHtml = activeAnnouncements.map(item => {
      const safeTitle = escapeHtml(item.title);
      const safeMessage = escapeHtml(item.message);

      if (safeTitle && safeMessage) {
        return `<span class="badge">📢 ${safeTitle}:</span> ${safeMessage}`;
      }

      return `<span class="badge">📢</span> ${safeTitle || safeMessage}`;
    }).join("&nbsp;&nbsp; • &nbsp;&nbsp;");

    const plainTextLength = activeAnnouncements
      .map(item => `${item.title}: ${item.message}`)
      .join(" • ")
      .length;

    setTickerMessage(tickerHtml, activeAnnouncements.length > 1 || plainTextLength > 70);

  } catch (err) {
    console.error(err);
    setTickerMessage("Announcements unavailable", false);
  }
}

function setupVideo() {
  const videoBox = document.getElementById("videoBox");

  if (!YOUTUBE_EMBED_URL) return;

  videoBox.innerHTML = `
    <iframe
      class="youtube-frame"
      src="${YOUTUBE_EMBED_URL}"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  `;
}

function setupPhotoRotation() {
  const photoBox = document.getElementById("photoBox");

  if (!PHOTO_SLIDES.length) return;

  photoBox.innerHTML = "";

  PHOTO_SLIDES.forEach((src, index) => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "slide-image";
    if (index === 0) img.classList.add("active");
    photoBox.appendChild(img);
  });

  const caption = document.createElement("div");
  caption.className = "photo-caption";
  caption.textContent = "Company Photos";
  photoBox.appendChild(caption);

  setInterval(() => {
    const images = document.querySelectorAll(".slide-image");
    if (!images.length) return;

    images[photoIndex].classList.remove("active");
    photoIndex = (photoIndex + 1) % images.length;
    images[photoIndex].classList.add("active");
  }, 3000);
}

updateClock();
getWeather();
loadAnnouncements();
setupVideo();
setupPhotoRotation();

setInterval(updateClock, 1000);
setInterval(getWeather, 10 * 60 * 1000);
setInterval(loadAnnouncements, 5 * 60 * 1000);
</script>

</body>
</html>
